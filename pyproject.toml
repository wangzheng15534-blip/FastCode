[tool.uv.workspace]
members = ["fastcode", "nanobot"]

[tool.ruff]
line-length = 88                                          # black-compatible default
target-version = "py311"                                  # minimum supported Python
exclude = ["_fastcode", "repos", "repo_backup", "_bmad-output"]  # vendored/generated: not project code

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle: syntax and whitespace errors
    "F",        # pyflakes: unused imports, variables, undefined names
    "I",        # isort: import ordering
    "B",        # flake8-bugbear: likely bugs and design problems
    "C4",       # comprehensions: simplify unnecessary list/dict/set calls
    "UP",       # pyupgrade: modernize Python syntax for 3.11+
    "ANN",      # flake8-annotations: enforce type annotations on public API
    "S",        # flake8-bandit: security anti-patterns
    "PT",       # flake8-pytest-style: pytest best practices
    "SIM",      # flake8-simplify: simplify unnecessarily complex code
    "RET",      # flake8-return: unnecessary return statements
    "RSE",      # flake8-raise: raise statement best practices
    "PL",       # Pylint: code quality and complexity limits
    "RUF",      # Ruff-specific: ambiguous unicode, unused noqa, etc.
    "TID251",   # flake8-tidy-imports: repo-wide banned compatibility imports
    "A",        # flake8-builtins: prevent shadowing builtins (id, list, dict)
    "EM",       # flake8-errmsg: no raw string literals in raise; named constants
    "PIE",      # flake8-pie: unnecessary spread, single-char startswith
    "PERF",     # perflint: performance anti-patterns (list-comp-in-for-loop)
    "FURB",     # refurb: modernize Python (simpler isinstance, unnecessary casts)
    "T20",      # flake8-print: ban print() in source; use logging or Rich
    "FLY",      # flynt: enforce f-strings over str.format(); style mandates f-strings
]

ignore = [
    "ANN401", # design: Any in *args/**kwargs is necessary for adapter/factory patterns
    "E501",   # tool-conflict: ruff formatter enforces line length; linter rule is redundant
    # --- Complexity limits (need refactoring, tracked separately) ---
    "PLR0911", # complexity: too-many-return-statements -- extract strategies to reduce
    "PLR0912", # complexity: too-many-branches -- extract branch handlers
    "PLR0913", # complexity: too-many-arguments -- bundle params into dataclasses
    "PLR0915", # complexity: too-many-statements -- decompose into smaller methods
    # --- Lazy imports (intentional to avoid circular deps and speed startup) ---
    "PLC0415", # design: import-outside-top-level -- guarded by try/except or deferred loading
    # --- Other deliberate patterns ---
    "B904",    # design: raise-without-from -- re-raising with context already in message
    "PLR2004", # design: magic-value-comparison -- domain thresholds are tuning knobs, not constants
    "PERF401", # design: for-append loops are readable; extend/comprehension refactor tracked separately
]

# ---------------------------------------------------------------------------
# Pyright: workspace-level type checking
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["fastcode/fastcode", "fastcode/tests", "tests"]
exclude = ["**/repos", "**/repo_backup", "**/_bmad-output", "**/_fastcode", "**/scip_pb2.py"]
extraPaths = [".", "./fastcode/fastcode"]
stubPath = "fastcode/fastcode/fastcode/_stubs"
venvPath = "."
venv = ".venv"
typeCheckingMode = "strict"                                                  # strict baseline; relaxations below are intentional
reportUnnecessaryComparison = true
reportUnusedVariable = true
reportMissingImports = "warning"                                              # third-party untyped deps shouldn't error
reportMissingTypeStubs = "none"                                               # custom stubs handle this; noise otherwise
reportUnknownVariableType = "warning"                                         # third-party untyped deps produce unknowns — signal, not block
reportUnknownMemberType = "warning"
reportUnknownArgumentType = "warning"
reportUnknownLambdaType = "warning"
reportUnknownParameterType = "warning"
reportPrivateUsage = "none"                                                   # internal cross-module access is common in this codebase
reportDeprecated = "warning"                                                  # deprecated API usage should surface but not block

# ---------------------------------------------------------------------------
# Import Linter: public facade / private implementation boundaries
# ---------------------------------------------------------------------------

[tool.importlinter]
root_package = "fastcode"
exclude_type_checking_imports = true

[[tool.importlinter.contracts]]
id = "main-private-config-schema"
name = "Main private config schema modules stay inside main"
type = "protected"
protected_modules = [
    "fastcode.main._config_schema_base",
    "fastcode.main._config_schema_indexing",
    "fastcode.main._config_schema_operations",
    "fastcode.main._config_schema_persistence",
    "fastcode.main._config_schema_querying",
    "fastcode.main._config_schema_root",
    "fastcode.main._config_runtime",
    "fastcode.main._capability_register",
    "fastcode.main._env_registry",
]
allowed_importers = [
    "fastcode.main.*",
]
as_packages = false

[[tool.importlinter.contracts]]
id = "semantic-resolver-private-implementation"
name = "Semantic resolver private implementation stays inside resolvers"
type = "protected"
protected_modules = [
    "fastcode.semantic.resolvers.engine.helper_operations",
    "fastcode.semantic.resolvers.engine.resolver_support",
]
allowed_importers = [
    "fastcode.semantic.resolvers.*",
    "fastcode.semantic.resolvers.engine.*",
    "fastcode.semantic.resolvers.languages.*",
]
as_packages = false

[[tool.importlinter.contracts]]
id = "store-private-payload-implementation"
name = "Store private payload modules stay inside store"
type = "protected"
protected_modules = [
    "fastcode.app.store.cache.payloads",
    "fastcode.app.store.artifacts.graph_payloads",
    "fastcode.app.store.snapshots.ir_payloads",
    "fastcode.app.store.snapshots.queue_payloads",
]
allowed_importers = [
    "fastcode.app.store.*",
    "fastcode.app.store.cache.*",
    "fastcode.app.store.artifacts.*",
    "fastcode.app.store.snapshots.*",
    "fastcode.app.store.vectors.*",
]
as_packages = false

[[tool.importlinter.contracts]]
id = "domain-no-app-upward"
name = "Domain packages must not import app use-flow"
type = "forbidden"
source_modules = [
    "fastcode.ir",
    "fastcode.graph",
    "fastcode.retrieval",
    "fastcode.semantic",
]
forbidden_modules = [
    "fastcode.app",
]
as_packages = true

[[tool.importlinter.contracts]]
id = "domain-no-infra-upward"
name = "Domain packages must not import infrastructure"
type = "forbidden"
source_modules = [
    "fastcode.ir",
    "fastcode.graph",
    "fastcode.retrieval",
    "fastcode.semantic",
]
forbidden_modules = [
    "fastcode.infrastructure",
]
as_packages = true

# Tests: known-good literals, untyped fixtures/mocks — Rust cfg(test) equivalent
[[tool.pyright.executionEnvironments]]
root = "fastcode/tests"
reportOptionalSubscript = "none"
reportOptionalMemberAccess = "none"
reportOptionalOperand = "none"
reportOptionalIterable = "none"
reportOperatorIssue = "none"
reportAttributeAccessIssue = "none"
reportArgumentType = "none"
reportUnknownArgumentType = "none"
reportUnknownMemberType = "none"
reportUnknownVariableType = "none"
reportUnknownLambdaType = "none"
reportUnknownParameterType = "none"
reportMissingParameterType = "none"   # fixtures, factories, hypothesis @given — untyped by design
reportUntypedFunctionDecorator = "none"
reportUnusedFunction = "none"
reportUnusedClass = "none"

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "tuple"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"fastcode.db_runtime".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.config".msg = "Do not add a top-level config hub; use runtime, schemas, main, domain-local, or infra-local config modules."
"fastcode.events".msg = "Deleted generic event hub; import runtime, domain-local, port, or adapter event contracts instead."
"fastcode.graph_runtime".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.llm_utils".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.module_resolver".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.path_utils".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.indexing.call_extractor".msg = "Deleted compatibility module; import fastcode.graph.call_extractor instead."
"fastcode.indexing.global_builder".msg = "Deleted compatibility module; import fastcode.scip.global_builder instead."
"fastcode.indexing.tree_sitter".msg = "Deleted compatibility module; import fastcode.graph.tree_sitter instead."
"fastcode.retrieval.agent_tools".msg = "Deleted compatibility module; import fastcode.app.query.agent.tools instead."
"fastcode.retrieval.core".msg = "Deleted compatibility package; import concrete retrieval modules instead."
"fastcode.retrieval.hybrid".msg = "Deleted compatibility module; import fastcode.app.query.selection.retriever instead."
"fastcode.retrieval.iterative".msg = "Deleted compatibility module; import fastcode.app.query.agent.iterative instead."
"fastcode.schemas.api".msg = "Deleted compatibility module; import concrete API schemas instead."
"fastcode.schemas.core_types".msg = "Deleted compatibility module; import canonical IR types instead."
"fastcode.utils._compat".msg = "Deleted compatibility module; import fastcode.main.config instead."
"fastcode.utils.core".msg = "Deleted compatibility module; import concrete utility modules instead."
"fastcode.utils.vectors".msg = "Deleted compatibility module; import store vector helpers instead."

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # design: assert is the test mechanism, not a runtime invariant
    "ANN201",  # design: test functions are named by convention, return type adds noise
    "ANN003",  # design: test factory **kwargs are intentionally untyped for flexibility
    "T20",     # design: print() allowed for debug output during test runs
    "A001",    # design: test imports may shadow builtins
    "A002",    # design: test params shadow builtins (id=1, list=[...], input=...)
]
"fastcode/tests/**/*.py" = [
    "S101",    # design: assert is the test mechanism, not a runtime invariant
    "ANN201",  # design: test functions are named by convention, return type adds noise
    "ANN003",  # design: test factory **kwargs are intentionally untyped for flexibility
    "T20",     # design: print() allowed for debug output during test runs
    "A001",    # design: test imports may shadow builtins
    "A002",    # design: test params shadow builtins (id=1, list=[...], input=...)
]
"demos/**/*.py" = [
    "T20",     # design: demos use print() for stdout output
    "S101",    # design: demos use assert for inline validation
    "S108",    # design: demos use /tmp for temporary storage
    "ANN201",  # design: demo scripts omit return types
]
"scripts/**/*.py" = [
    "T20",     # design: scripts use print() for stdout output
    "S602",    # design: scripts use subprocess with shell=True for convenience
    "S603",    # design: scripts use subprocess calls without validate
    "S607",    # design: scripts use partial executable paths
    "E402",    # design: scripts modify sys.path before local imports
]
"skills/**/*.py" = [
    "T20",     # design: skill scripts use print() for stdout output
    "RUF001",  # design: skill scripts use unicode multiplication sign in report tables
    "RUF003",  # design: skill scripts use unicode in comments
    "SIM102",  # design: skill scripts have nested if patterns for readability
]
"nanobot/**/*.py" = [
    "ANN202",  # design: nanobot private functions omit return types
    "A002",    # design: typer CLI options use builtin names (--all, --input)
    "N803",    # design: API parameter names match upstream service (extractMode, maxChars)
    "E741",    # design: short variable names in iterator context
    "S112",    # design: try-except-continue in event processing — individual failures are non-fatal
    "F821",    # design: forward references resolved at runtime
]

[tool.pytest.ini_options]
testpaths = ["tests", "fastcode/tests"]
addopts = [
    "-p no:schemathesis",
    "--strict-markers",        # Fail on unknown markers — prevents typos silently passing
    "--strict-config",         # Fail on unknown config keys — catches misspelled options
    "--tb=short",              # Concise tracebacks — full tb available with --tb=long
    "-v",                      # Verbose: show individual test names, not just dots
    "--timeout=60",            # Kill stuck tests after 60s — prevents CI hangs
]
norecursedirs = [
    ".git",
    ".hg",
    ".svn",
    ".tox",
    ".venv",
    ".hypothesis",
    "__pycache__",
    "dist",
    "build",
    "repo_backup",
    "repos",
    "_bmad",
    "_bmad-output",
]
pythonpath = [".", "fastcode/fastcode", "nanobot"]
asyncio_mode = "auto"
markers = [
    "edge: boundary values, empty inputs, off-by-one",
    "negative: invalid input, expected failures",
    "test_double: mocks, fakes, stubs, patches",
    "integration: tests requiring real database or external service",
    "e2e: end-to-end user flow",
    "regression: guards against previously-identified bugs",
    "perf: performance benchmark tests",
    "property: property-based or fuzz-style test coverage",
    "hypothesis: hypothesis property-based tests",
    "parametrize: pytest parametrized tests",
    "benchmark: benchmark tests",
    "snapshot: snapshot-style regression checks",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::ResourceWarning",
    "ignore::UserWarning",
    "ignore:Benchmarks are automatically disabled because xdist plugin is active:pytest_benchmark.logger.PytestBenchmarkWarning",
]

[tool.coverage.run]
source = ["fastcode"]
branch = true
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/.*",
]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
]
