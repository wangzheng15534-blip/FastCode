[tool.uv.workspace]
members = ["fastcode", "nanobot"]

[tool.ruff]
line-length = 88                                          # black-compatible default
target-version = "py311"                                  # minimum supported Python
exclude = ["_fastcode", "repos", "repo_backup", "_bmad-output"]  # vendored/generated: not project code

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle: syntax and whitespace errors
    "F",        # pyflakes: unused imports, variables, undefined names
    "I",        # isort: import ordering
    "B",        # flake8-bugbear: likely bugs and design problems
    "C4",       # comprehensions: simplify unnecessary list/dict/set calls
    "UP",       # pyupgrade: modernize Python syntax for 3.11+
    "ANN",      # flake8-annotations: enforce type annotations on public API
    "S",        # flake8-bandit: security anti-patterns
    "PT",       # flake8-pytest-style: pytest best practices
    "SIM",      # flake8-simplify: simplify unnecessarily complex code
    "RET",      # flake8-return: unnecessary return statements
    "RSE",      # flake8-raise: raise statement best practices
    "PL",       # Pylint: code quality and complexity limits
    "RUF",      # Ruff-specific: ambiguous unicode, unused noqa, etc.
]

ignore = [
    "ANN401", # design: Any in *args/**kwargs is necessary for adapter/factory patterns
    "E501",   # tool-conflict: ruff formatter enforces line length; linter rule is redundant
    # --- Complexity limits (need refactoring, tracked separately) ---
    "PLR0911", # complexity: too-many-return-statements -- extract strategies to reduce
    "PLR0912", # complexity: too-many-branches -- extract branch handlers
    "PLR0913", # complexity: too-many-arguments -- bundle params into dataclasses
    "PLR0915", # complexity: too-many-statements -- decompose into smaller methods
    # --- Lazy imports (intentional to avoid circular deps and speed startup) ---
    "PLC0415", # design: import-outside-top-level -- guarded by try/except or deferred loading
    # --- Security rules (usage is deliberate in this codebase) ---
    "S108",    # design: hardcoded-temp-file -- test-only, no production exposure
    "S110",    # design: try-except-pass -- intentional silencing of non-critical errors
    "S112",    # design: try-except-continue -- intentional silencing in loop processing
    "S301",    # design: suspicious-pickle -- used for BM25/index serialization, not untrusted input
    "S310",    # design: suspicious-url-open -- test-only, connecting to localhost
    "S324",    # design: insecure-hash -- MD5 used for non-crypto cache keys, not security
    "S603",    # design: subprocess-without-shell -- shell=False is already the safer default
    "S607",    # design: start-process-with-partial-path -- git and SCIP binaries in PATH
    "S608",    # design: hardcoded-sql-expression -- parameterized queries, literals are table names
    # --- Other deliberate patterns ---
    "B017",    # design: assert-raises-exception -- pytest Exception catch is intentional in tests
    "B904",    # design: raise-without-from -- re-raising with context already in message
    "E722",    # design: bare-except -- intentional catch-all in error boundary patterns
    "PLR2004", # design: magic-value-comparison -- domain thresholds are tuning knobs, not constants
]

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "tuple"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # design: assert is the test mechanism, not a runtime invariant
    "ANN201",  # design: test functions are named by convention, return type adds noise
    "ANN003",  # design: test factory **kwargs are intentionally untyped for flexibility
]
"mcp_server.py" = [
    "E402",    # tool-conflict: sys.path must be set before imports; E402 is unavoidable here
    "PLC0415", # design: lazy imports inside tool functions to keep startup fast
    "ANN001",  # complexity: MCP tool helper args need types (track: annotate all tool handlers)
    "ANN202",  # complexity: private helper return types (track: annotate all public methods)
    "PLW0603", # design: global statement for lazy singleton — intentional module-level cache
    "PLR2004", # design: MCP tool bodies use literal config values (depths, limits)
    "PLR0912", # complexity: get_file_summary has many branches for file type handling (track: extract file type handlers)
    "PLR0913", # complexity: _walk_call_chain takes 6 params (track: bundle into ChainRequest dataclass)
    "RUF013",  # design: implicit Optional in default arg is deliberate for MCP tool ergonomics
    "RUF003",  # design: en-dash in docstring is intentional typographic choice
]
