# Lefthook for FastCode
#
# Setup (run once):
#   git config --unset-all --local core.hooksPath
#   lefthook install

pre-commit:
  parallel: true
  commands:
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix --force-exclude {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
    typos:
      run: typos
    typecheck:
      glob: "*.py"
      run: uv run pyright fastcode/src/ fastcode/tests/ tests/
    smoke-test:
      glob: "*.py"
      run: uv run pytest fastcode/tests/ -q -n auto --timeout=60 -x -m "not (integration or e2e)" --ignore=fastcode/tests/bench_

pre-push:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged
    unit-test:
      run: uv run pytest fastcode/tests/ tests/ -q -n auto --timeout=30 -m "not (integration or e2e)" --ignore=fastcode/tests/bench_
    extended-tests:
      run: uv run pytest fastcode/tests/ tests/ -q -n auto --timeout=60 -m "hypothesis or snapshot"
