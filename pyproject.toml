[tool.uv.workspace]
members = ["fastcode", "nanobot"]

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = ["_fastcode"]

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "B",        # flake8-bugbear
    "C4",       # comprehensions
    "UP",       # pyupgrade
    "ANN",      # flake8-annotations
    "S",        # flake8-bandit
    "PT",       # flake8-pytest-style
    "SIM",      # flake8-simplify
    "RET",      # flake8-return
    "RSE",      # flake8-raise
    "PL",       # Pylint
    "RUF",      # Ruff-specific rules
]

ignore = [
    "ANN101", # Missing type annotation for self
    "ANN102", # Missing type annotation for cls
    "ANN401", # Dynamically typed expressions (Any) in *args/kwargs
    "E501",   # Line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # Allow assert in tests
    "ANN201",  # Missing return type for test functions
    "ANN003",  # Missing type annotation for **kwargs in test factories
    "PLR2004", # Allow magic values in test assertions
    "PLR0913", # Allow many args in test factory functions
]
"fastcode/retriever.py" = [
    "ANN201",  # Missing return type annotation (pre-existing)
    "ANN204",  # Missing return type for __init__ (pre-existing)
    "PLR0912", # Too many branches (pre-existing, needs refactor)
    "PLR0913", # Too many arguments (pre-existing, needs refactor)
    "PLR0915", # Too many statements (pre-existing, needs refactor)
    "PLR2004", # Magic values (pre-existing)
    "SIM102",  # Nested if statements (pre-existing)
    "PLR1714", # Merge comparisons (pre-existing)
    "S301",    # pickle usage (pre-existing)
    "PLC0415", # Lazy imports (pre-existing)
]
"fastcode/core/scip_transform.py" = [
    "PLC0415", # Intentional lazy import — protobuf may not be installed
]
"fastcode/scip_loader.py" = [
    "PLC0415", # Lazy imports (pre-existing)
    "S603",    # subprocess call (pre-existing)
    "B904",    # raise without from (pre-existing)
    "ANN001",  # Missing type annotation (pre-existing)
]
"mcp_server.py" = [
    "E402",    # Module-level imports after sys.path setup (intentional)
    "PLC0415", # Lazy imports inside tool functions (intentional)
    "ANN001",  # Missing type annotations for MCP tool helper args
    "ANN202",  # Missing return type for private helpers
    "PLW0603", # Global statement for lazy singleton
    "PLR2004", # Magic values in MCP tool bodies
    "PLR0912", # Many branches in get_file_summary
    "PLR0913", # Many args in _walk_call_chain
    "RUF013",  # Implicit Optional in _walk_call_chain default
    "RUF003",  # En-dash in docstring comment
]
"fastcode/core/iteration.py" = [
    "PLR2004", # Magic values: threshold constants from original logic
    "PLR0913", # Too many arguments: should_continue_iteration needs all params
    "PLR0911", # Too many returns: should_continue_iteration has 6 stopping checks
    "PLR0912", # Too many branches: should_continue_iteration stopping checks
]
"fastcode/core/prompts.py" = [
    "PLR0912", # Too many branches: extracted verbatim from iterative_agent.py
]
"fastcode/core/parsing.py" = [
    "S110",    # try-except-pass: intentional fallback strategy in robust_json_parse
    "S112",    # try-except-continue: intentional fallback strategy in robust_json_parse
    "PLR0912", # Too many branches: sanitize_json_string handles many char types
    "PLR2004", # Magic value 32: control character threshold (ASCII range)
]
"fastcode/iterative_agent.py" = [
    "ANN001",  # Missing type annotation for args (pre-existing)
    "ANN201",  # Missing return type for public functions (pre-existing)
    "ANN202",  # Missing return type for private functions (pre-existing)
    "ANN204",  # Missing return type for __init__ (pre-existing)
    "PLR0912", # Too many branches (pre-existing, needs refactor)
    "PLR0913", # Too many arguments (pre-existing, needs refactor)
    "PLR0915", # Too many statements (pre-existing, needs refactor)
    "PLR2004", # Magic values (pre-existing)
    "RET504",  # Unnecessary assignment before return (pre-existing)
    "PLC0415", # Lazy imports (pre-existing)
    "E722",    # Bare except (pre-existing)
    "S112",    # try-except-continue (pre-existing)
    "S110",    # try-except-pass (pre-existing)
    "W293",    # Blank line contains whitespace (pre-existing)
    "B007",    # Unused loop control variable (pre-existing)
    "SIM108",  # Use ternary instead of if-else (pre-existing)
    "RUF059",  # Unused unpacked variable (pre-existing)
    "C901",    # Too complex (pre-existing)
]
"fastcode/answer_generator.py" = [
    "ANN201",  # Missing return type for public functions (pre-existing)
    "ANN202",  # Missing return type for private functions (pre-existing)
    "ANN204",  # Missing return type for __init__ (pre-existing)
    "PLR0912", # Too many branches (pre-existing)
    "PLR0915", # Too many statements (pre-existing)
    "PLR2004", # Magic values (pre-existing)
    "PLC0415", # Lazy imports (pre-existing)
    "RET504",  # Unnecessary assignment before return (pre-existing)
    "W291",    # Trailing whitespace (pre-existing)
    "UP028",   # Yield in generator (pre-existing)
]
"fastcode/main.py" = [
    "ANN001",  # Missing type annotation for args (pre-existing)
    "ANN201",  # Missing return type for public functions (pre-existing)
    "ANN202",  # Missing return type for private functions (pre-existing)
    "ANN204",  # Missing return type for __init__ (pre-existing)
    "PLR0912", # Too many branches (pre-existing)
    "PLR0913", # Too many arguments (pre-existing)
    "PLR0915", # Too many statements (pre-existing)
    "PLC0415", # Lazy imports (pre-existing)
    "S324",    # SHA1 usage (pre-existing, used for non-security hashing)
    "S301",    # pickle usage (pre-existing)
    "PLR2004", # Magic values (pre-existing)
    "B904",    # raise from None (pre-existing)
    "RUF013",  # Implicit Optional (pre-existing)
    "F821",    # Forward reference (pre-existing)
]
"fastcode/core/snapshot.py" = [
    "S324",    # SHA1 usage (non-security cache key hashing, matches main.py)
]
"fastcode/core/combination.py" = [
    "PLR0913", # Too many arguments: combine_results needs all params
    "PLR0912", # Too many branches: merge logic for 3 result types
]
"fastcode/core/repo_analysis.py" = [
    "PLR0911", # Too many returns: infer_project_type if-chain (extracted verbatim)
]
"fastcode/repo_overview.py" = [
    "ANN202",  # Missing return type for private functions (pre-existing)
    "ANN204",  # Missing return type for __init__ (pre-existing)
    "F401",    # Unused import pathlib.Path (pre-existing)
    "UP006",   # Use dict/list instead of Dict/List (pre-existing)
    "UP015",   # Unnecessary mode argument in open() (pre-existing)
    "UP035",   # Deprecated typing imports (pre-existing)
    "UP045",   # Use X | None instead of Optional (pre-existing)
    "W291",    # Trailing whitespace (pre-existing)
    "W293",    # Blank line contains whitespace (pre-existing)
    "RET504",  # Unnecessary assignment before return (pre-existing)
    "RET505",  # Unnecessary elif after return (pre-existing)
    "I001",    # Import sorting (pre-existing)
    "SIM102",  # Nested if statements (pre-existing)
    "PLR2004", # Magic values (pre-existing)
]
"fastcode/utils/_compat.py" = [
    "S324",    # MD5 usage (pre-existing, non-security file hashing)
    "PLC0415", # Lazy imports (pre-existing, pathspec may not be installed)
    "ANN001",  # Missing type annotation (pre-existing)
    "ANN002",  # Missing type annotation for *args (pre-existing)
    "ANN202",  # Missing return type for private functions (pre-existing)
    "PLR0911", # Too many returns (pre-existing)
]
"fastcode/schema/ir.py" = [
    "ANN204",  # Missing return type for __init__ (extracted from semantic_ir.py)
    "PLR0913", # Too many arguments: IRSnapshot.__init__ (extracted from semantic_ir.py)
    "PLC0415", # Lazy imports: IRSnapshot references types in semantic_ir.py to avoid circular dep
]

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "tuple"

[tool.pyright]
include = ["fastcode", "tests"]
typeCheckingMode = "strict"
reportUnnecessaryComparison = true
reportUnreachableCode = true
reportUnusedVariable = true
reportUnusedCallResult = true
reportUnknownArgumentType = "error"
reportUnknownMemberType = "error"
reportUnknownVariableType = "error"
reportUntypedFunctionDecorator = "error"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"
addopts = "-n auto"
timeout = 30
timeout_method = "thread"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "property: hypothesis property-based tests",
    "snapshot: syrupy snapshot contract tests",
    "happy: normal-path test (valid inputs, expected behavior)",
    "edge: edge-case test (boundary, empty, invalid, extreme inputs)",
    "mutation: tests designed to kill mutants",
    "integration: tests requiring real database or external service",
]
