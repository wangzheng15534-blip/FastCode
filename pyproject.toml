[tool.uv.workspace]
members = ["fastcode", "nanobot"]

[tool.ruff]
line-length = 88                                          # black-compatible default
target-version = "py311"                                  # minimum supported Python
exclude = ["_fastcode", "repos", "repo_backup", "_bmad-output"]  # vendored/generated: not project code

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle: syntax and whitespace errors
    "F",        # pyflakes: unused imports, variables, undefined names
    "I",        # isort: import ordering
    "B",        # flake8-bugbear: likely bugs and design problems
    "C4",       # comprehensions: simplify unnecessary list/dict/set calls
    "UP",       # pyupgrade: modernize Python syntax for 3.11+
    "ANN",      # flake8-annotations: enforce type annotations on public API
    "S",        # flake8-bandit: security anti-patterns
    "PT",       # flake8-pytest-style: pytest best practices
    "SIM",      # flake8-simplify: simplify unnecessarily complex code
    "RET",      # flake8-return: unnecessary return statements
    "RSE",      # flake8-raise: raise statement best practices
    "PL",       # Pylint: code quality and complexity limits
    "RUF",      # Ruff-specific: ambiguous unicode, unused noqa, etc.
    "TID251",   # flake8-tidy-imports: repo-wide banned compatibility imports
]

ignore = [
    "ANN401", # design: Any in *args/**kwargs is necessary for adapter/factory patterns
    "E501",   # tool-conflict: ruff formatter enforces line length; linter rule is redundant
    # --- Complexity limits (need refactoring, tracked separately) ---
    "PLR0911", # complexity: too-many-return-statements -- extract strategies to reduce
    "PLR0912", # complexity: too-many-branches -- extract branch handlers
    "PLR0913", # complexity: too-many-arguments -- bundle params into dataclasses
    "PLR0915", # complexity: too-many-statements -- decompose into smaller methods
    # --- Lazy imports (intentional to avoid circular deps and speed startup) ---
    "PLC0415", # design: import-outside-top-level -- guarded by try/except or deferred loading
    # --- Other deliberate patterns ---
    "B904",    # design: raise-without-from -- re-raising with context already in message
    "PLR2004", # design: magic-value-comparison -- domain thresholds are tuning knobs, not constants
]

# ---------------------------------------------------------------------------
# Pyright: workspace-level type checking
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["fastcode/src", "fastcode/tests", "tests"]
exclude = ["**/repos", "**/repo_backup", "**/_bmad-output", "**/_fastcode", "**/scip_pb2.py"]
extraPaths = [".", "./fastcode/src"]
stubPath = "fastcode/src/fastcode/_stubs"
venvPath = "."
venv = ".venv"
typeCheckingMode = "strict"                                                  # strict baseline; relaxations below are intentional
reportUnnecessaryComparison = true
reportUnusedVariable = true
reportMissingImports = "warning"                                              # third-party untyped deps shouldn't error
reportMissingTypeStubs = "none"                                               # custom stubs handle this; noise otherwise
reportUnknownVariableType = "warning"                                         # third-party untyped deps produce unknowns — signal, not block
reportUnknownMemberType = "warning"
reportUnknownArgumentType = "warning"
reportUnknownLambdaType = "warning"
reportUnknownParameterType = "warning"
reportPrivateUsage = "none"                                                   # internal cross-module access is common in this codebase
reportDeprecated = "warning"                                                  # deprecated API usage should surface but not block

# Tests: known-good literals, untyped fixtures/mocks — Rust cfg(test) equivalent
[[tool.pyright.executionEnvironments]]
root = "fastcode/tests"
reportOptionalSubscript = "none"
reportOptionalMemberAccess = "none"
reportOptionalOperand = "none"
reportOptionalIterable = "none"
reportOperatorIssue = "none"
reportAttributeAccessIssue = "none"
reportArgumentType = "none"
reportUnknownArgumentType = "none"
reportUnknownMemberType = "none"
reportUnknownVariableType = "none"
reportUnknownLambdaType = "none"
reportUnknownParameterType = "none"
reportMissingParameterType = "none"   # fixtures, factories, hypothesis @given — untyped by design
reportUntypedFunctionDecorator = "none"
reportUnusedFunction = "none"
reportUnusedClass = "none"

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "tuple"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"fastcode.db_runtime".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.config".msg = "Do not add a top-level config hub; use runtime, schemas, main, domain-local, or infra-local config modules."
"fastcode.events".msg = "Deleted generic event hub; import runtime, domain-local, port, or adapter event contracts instead."
"fastcode.graph_runtime".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.llm_utils".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.module_resolver".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.path_utils".msg = "Deleted compatibility module; import the owning split package instead."
"fastcode.indexing.call_extractor".msg = "Deleted compatibility module; import fastcode.graph.call_extractor instead."
"fastcode.indexing.global_builder".msg = "Deleted compatibility module; import fastcode.scip.global_builder instead."
"fastcode.indexing.tree_sitter".msg = "Deleted compatibility module; import fastcode.graph.tree_sitter instead."
"fastcode.retrieval.agent_tools".msg = "Deleted compatibility module; import fastcode.query.agent_tools instead."
"fastcode.retrieval.core".msg = "Deleted compatibility package; import concrete retrieval modules instead."
"fastcode.retrieval.hybrid".msg = "Deleted compatibility module; import fastcode.query.retriever instead."
"fastcode.retrieval.iterative".msg = "Deleted compatibility module; import fastcode.query.iterative_agent instead."
"fastcode.schemas.api".msg = "Deleted compatibility module; import concrete API schemas instead."
"fastcode.schemas.core_types".msg = "Deleted compatibility module; import canonical IR types instead."
"fastcode.utils._compat".msg = "Deleted compatibility module; import fastcode.main.config instead."
"fastcode.utils.core".msg = "Deleted compatibility module; import concrete utility modules instead."
"fastcode.utils.vectors".msg = "Deleted compatibility module; import store vector helpers instead."

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",    # design: assert is the test mechanism, not a runtime invariant
    "ANN201",  # design: test functions are named by convention, return type adds noise
    "ANN003",  # design: test factory **kwargs are intentionally untyped for flexibility
]
"fastcode/tests/**/*.py" = [
    "S101",    # design: assert is the test mechanism, not a runtime invariant
    "ANN201",  # design: test functions are named by convention, return type adds noise
    "ANN003",  # design: test factory **kwargs are intentionally untyped for flexibility
]

[tool.pytest.ini_options]
testpaths = ["tests", "fastcode/tests"]
addopts = "-p no:schemathesis"
norecursedirs = [
    ".git",
    ".hg",
    ".svn",
    ".tox",
    ".venv",
    ".hypothesis",
    "__pycache__",
    "dist",
    "build",
    "repo_backup",
    "repos",
    "_bmad",
    "_bmad-output",
]
pythonpath = [".", "fastcode/src", "nanobot"]
asyncio_mode = "auto"
markers = [
    "edge: boundary values, empty inputs, off-by-one",
    "negative: invalid input, expected failures",
    "test_double: mocks, fakes, stubs, patches",
    "integration: tests requiring real database or external service",
    "e2e: end-to-end user flow",
    "regression: guards against previously-identified bugs",
    "perf: performance benchmark tests",
    "property: property-based or fuzz-style test coverage",
    "hypothesis: hypothesis property-based tests",
    "parametrize: pytest parametrized tests",
    "benchmark: benchmark tests",
    "snapshot: snapshot-style regression checks",
]
filterwarnings = [
    "ignore:Benchmarks are automatically disabled because xdist plugin is active:pytest_benchmark.logger.PytestBenchmarkWarning",
]
