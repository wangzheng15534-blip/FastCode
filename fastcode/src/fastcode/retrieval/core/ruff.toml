extend = "../../../../pyproject.toml"

[lint]
extend-select = ["TID"]

[lint.flake8-tidy-imports.banned-api]
"pydantic".msg = "retrieval.core must stay Pydantic-free."
"sqlite3".msg = "retrieval.core must stay independent of database I/O."
"subprocess".msg = "retrieval.core must stay independent of process execution."
"urllib".msg = "retrieval.core must stay independent of network I/O."
"fastcode.api".msg = "retrieval.core must not depend on entrypoint shells."
"fastcode.graph".msg = "retrieval.core should consume IR-level data, not graph orchestration."
"fastcode.indexing".msg = "retrieval.core must stay independent of indexing orchestration."
"fastcode.main".msg = "retrieval.core must not depend on the composition root."
"fastcode.mcp".msg = "retrieval.core must not depend on transport shells."
"fastcode.query".msg = "retrieval.core must stay independent of query orchestration."
"fastcode.retrieval.agent_tools".msg = "retrieval.core must stay independent of tool orchestration."
"fastcode.retrieval.hybrid".msg = "retrieval.core must stay independent of retrieval orchestration."
"fastcode.retrieval.iterative".msg = "retrieval.core must stay independent of agent orchestration."
"fastcode.schemas.api".msg = "retrieval.core may use frozen schemas.core_types, not Pydantic API schemas."
"fastcode.scip".msg = "retrieval.core must stay independent of SCIP loading and adapters."
"fastcode.semantic".msg = "retrieval.core must stay independent of semantic adapters."
"fastcode.store".msg = "retrieval.core must stay independent of storage orchestration."
