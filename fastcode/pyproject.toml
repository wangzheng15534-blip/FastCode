# ---------------------------------------------------------------------------
# Pyright: per-project settings
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["src", "tests"]                                               # scope: package source + tests
exclude = ["**/repos", "**/repo_backup", "**/_bmad-output", "**/_fastcode"]
extraPaths = ["."]                                                       # workspace root: resolves fastcode.* imports
typeCheckingMode = "strict"                                              # maximum type safety — fix errors, don't suppress
reportUnnecessaryComparison = true                                      # dead comparisons are bugs
reportUnusedVariable = true                                              # dead variables are bugs

[[tool.pyright.executionEnvironments]]
root = "tests"                                                          # Rust cfg(test) equivalent — test code uses known-good literals
reportOptionalSubscript = "none"                                        # crash IS the assertion
reportOptionalMemberAccess = "none"
reportOptionalOperand = "none"
reportOptionalIterable = "none"
reportOperatorIssue = "none"
reportAttributeAccessIssue = "none"
reportArgumentType = "none"
reportUnknownArgumentType = "none"                                      # fixtures and mocks are untyped by design
reportUnknownMemberType = "none"
reportUnknownVariableType = "none"
reportMissingParameterType = "none"

# ---------------------------------------------------------------------------
# Pytest: test discovery and configuration
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"
addopts = "-n auto"
timeout = 30
timeout_method = "thread"
pythonpath = [".."]                                                      # workspace root: resolves api.py, mcp_server.py imports
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "property: hypothesis property-based tests",
    "snapshot: syrupy snapshot contract tests",
    "happy: normal-path test (valid inputs, expected behavior)",
    "edge: edge-case test (boundary, empty, invalid, extreme inputs)",
    "mutation: tests designed to kill mutants",
    "integration: tests requiring real database or external service",
]
