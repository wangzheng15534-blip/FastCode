name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check fastcode/src/ fastcode/tests/ tests/
      - run: uv run ruff format --check fastcode/src/ fastcode/tests/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run pyright fastcode/src/ fastcode/tests/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run pytest fastcode/tests/ tests/ -q -n auto --timeout=60 -m "not slow and not property and not snapshot and not integration"

  extended:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run pytest fastcode/tests/property/ fastcode/tests/snapshots/ fastcode/tests/test_*parametrize* -q -n auto --timeout=120

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run pip-audit

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run mutmut run --paths-to-mutate fastcode/src/fastcode/ --runner "uv run pytest fastcode/tests/ -x -q --tb=short -o 'addopts=' -k 'not slow'" --use-coverage
