extend = "../../../pyproject.toml"

[lint]
extend-select = ["TID"]

[lint.flake8-tidy-imports.banned-api]
"pydantic".msg = "The graph layer must stay Pydantic-free."
"sqlite3".msg = "The graph layer must stay independent of database I/O."
"subprocess".msg = "The graph layer must stay independent of process execution."
"urllib".msg = "The graph layer must stay independent of network I/O."
"fastcode.api".msg = "The graph layer must not depend on entrypoint shells."
"fastcode.main".msg = "The graph layer must not depend on the composition root."
"fastcode.mcp".msg = "The graph layer must not depend on transport shells."
"fastcode.query".msg = "Graph construction must stay independent of query orchestration."
"fastcode.retrieval".msg = "Graph construction must stay independent of retrieval orchestration."
"fastcode.schemas".msg = "Graph construction should depend on IR and helpers, not boundary schemas."
"fastcode.store".msg = "Graph construction must stay independent of storage orchestration."
