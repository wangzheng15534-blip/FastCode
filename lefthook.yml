# Lefthook for FastCode - Parallel High-Rigor Checks
pre-commit:
  parallel: true
  commands:
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix --force-exclude {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
    typos:
      run: typos

pre-push:
  parallel: true
  commands:
    pyright:
      run: uv run pyright fastcode/src/ fastcode/tests/ tests/
    tests:
      run: uv run pytest fastcode/tests/ tests/ -n auto
    security:
      run: uv run pip-audit
